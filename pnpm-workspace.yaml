packages:
  - apps/*
  - packages/*

catalog:
  oxfmt: ^0.59.0
  oxlint: ^1.74.0
  typescript: ^7.0.2
  tailwindcss: ^4.3.3
  zod: ^4.4.3

auditConfig:
  ignoreCves: []
  ignoreGhsas: []

minimumReleaseAge: 480

minimumReleaseAgeExclude:
  - '@cloudflare/*'
  - wrangler
  - miniflare
  - typescript

allowBuilds:
  "@google/genai": true
  "@mongodb-js/zstd": true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  protobufjs: true
  sharp: true
  workerd: true
