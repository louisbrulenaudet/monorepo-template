name: CI

on:
  push:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: "1"
  TELEMETRY_DISABLED: "1"
  WRANGLER_SEND_METRICS: "false"

jobs:
  ci:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: make install-frozen

      - parallel:
          - name: Lint
            run: pnpm turbo run lint

          - name: Format check
            run: pnpm turbo run format

          - name: Generate Worker types
            run: pnpm turbo run types --filter='./apps/*'

      - name: Typecheck
        run: pnpm turbo run check-types

      - name: Build
        env:
          VITE_API_BASE_URL: https://worker-api-ci.monorepo-template.workers.dev
        run: pnpm turbo run build
